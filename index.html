<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Jadwal First Taker UKMPPD 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf8f4;--warm:#f2ede5;--card:#ffffff;--card2:#f7f5f1;
  --ink:#1c1917;--ink2:#44403c;--muted:#78716c;--ghost:#a8a29e;--line:#e7e3dc;--line2:#d6d0c8;
  --blue:#3b82f6;--blue-s:#eff6ff;--blue-b:#bfdbfe;--blue-d:#1d4ed8;
  --rose:#f43f5e;--rose-s:#fff1f2;--rose-b:#fecdd3;
  --violet:#8b5cf6;--violet-s:#f5f3ff;--violet-b:#ddd6fe;
  --amber:#f59e0b;--amber-s:#fffbeb;--amber-b:#fde68a;
  --emerald:#10b981;--emerald-s:#ecfdf5;--emerald-b:#a7f3d0;
  --sky:#0ea5e9;--sky-s:#f0f9ff;--sky-b:#bae6fd;
  --pink:#ec4899;--pink-s:#fdf2f8;--pink-b:#f9a8d4;
  --r:10px;--rl:16px;--rx:22px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --shx:0 20px 60px rgba(0,0,0,.1),0 8px 20px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--cream);color:var(--ink);font-size:13.5px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--warm)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}

/* ── HEADER ── */
.hd{background:rgba(250,248,244,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.hdi{max-width:1760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;min-height:58px;gap:.75rem;flex-wrap:wrap;padding:.5rem 0}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#ec4899);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.ht{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.5px;line-height:1.2}
.hs{font-size:10.5px;color:var(--muted);font-weight:500;margin-top:1px}
.hr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tabs{display:flex;gap:3px;background:var(--warm);border-radius:12px;padding:3px;border:1px solid var(--line)}
.tb{padding:7px 18px;border-radius:9px;border:none;background:transparent;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tb.on{background:white;color:var(--ink);box-shadow:var(--sh)}
.tb:hover:not(.on){color:var(--ink2)}

/* ── SYNC BAR ── */
.sync-bar{background:white;border-bottom:1px solid var(--line);padding:7px 1.5rem}
.sync-inner{max-width:1760px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ghost);flex-shrink:0;transition:all .4s}
.sync-dot.ok{background:var(--emerald);box-shadow:0 0 8px rgba(16,185,129,.4)}
.sync-dot.err{background:var(--rose)}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#sync-txt{font-size:11px;color:var(--muted);font-weight:500}
.sync-cfg-btn{padding:3px 10px;border-radius:6px;border:1px solid var(--line2);background:white;font-family:inherit;font-size:11px;cursor:pointer;color:var(--blue);font-weight:600;transition:all .15s}
.sync-cfg-btn:hover{background:var(--blue-s);border-color:var(--blue-b)}
#sync-last{font-size:10px;color:var(--ghost);margin-left:auto;font-family:'DM Mono',monospace}

/* ── PROGRESS BAR ── */
.pb{background:white;border-bottom:1px solid var(--line);padding:10px 1.5rem}
.pbi{max-width:1760px;margin:0 auto;display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap}
.pi{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-weight:500}
.pt{width:90px;height:5px;background:var(--line);border-radius:99px;overflow:hidden;flex-shrink:0}
.pf{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.fb{background:linear-gradient(90deg,#6366f1,#3b82f6)}
.fa2{background:linear-gradient(90deg,#f59e0b,#f97316)}
.pp{font-weight:700;color:var(--ink);font-size:12px;min-width:34px;font-family:'DM Mono',monospace}

/* ── MAIN ── */
.mn{max-width:1760px;margin:0 auto;padding:1.25rem 1.5rem 4rem}
.pn{display:none}.pn.on{display:block}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.sc{background:white;border:1px solid var(--line);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shm)}
.sc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.sc:nth-child(1) .sc-bar{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.sc:nth-child(2) .sc-bar{background:linear-gradient(90deg,#f59e0b,#f97316)}
.sc:nth-child(3) .sc-bar{background:linear-gradient(90deg,#10b981,#0ea5e9)}
.sc:nth-child(4) .sc-bar{background:linear-gradient(90deg,#ec4899,#f43f5e)}
.sl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.sv{font-size:28px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1.5px;font-family:'DM Mono',monospace}
.ss{font-size:10px;color:var(--ghost);margin-top:4px;font-weight:500}

/* ── WEEK SECTION ── */
.ws{margin-bottom:2rem}
.wh{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding:10px 16px;background:white;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);position:relative;overflow:hidden}
.wh::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.ws:nth-child(1) .wh::before,.ws:nth-child(5) .wh::before{background:linear-gradient(180deg,#6366f1,#8b5cf6)}
.ws:nth-child(2) .wh::before,.ws:nth-child(6) .wh::before{background:linear-gradient(180deg,#f59e0b,#f97316)}
.ws:nth-child(3) .wh::before,.ws:nth-child(7) .wh::before{background:linear-gradient(180deg,#10b981,#0ea5e9)}
.ws:nth-child(4) .wh::before,.ws:nth-child(8) .wh::before{background:linear-gradient(180deg,#ec4899,#f43f5e)}
.wh-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--violet-s);color:var(--violet);border:1px solid var(--violet-b);font-family:'DM Mono',monospace;flex-shrink:0}
.wh-label{font-size:13px;font-weight:700;color:var(--ink)}
.wh-dates{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace;font-weight:500}

/* ── TABLE ── */
.ts{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--line);box-shadow:var(--shm);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:white;font-size:12px}

/* Double header */
.th-span{background:var(--card2);font-weight:700;font-size:9.5px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
.th-pg-group{background:linear-gradient(135deg,#eff6ff,#f0f9ff);color:var(--blue-d);font-size:10px;font-weight:800;text-align:center;padding:7px 10px;border-bottom:2px solid var(--blue-b);letter-spacing:.4px;text-transform:uppercase;border-left:1px solid var(--blue-b)}
.th-sg-group{background:linear-gradient(135deg,#ecfdf5,#f0fdf4);color:#065f46;font-size:10px;font-weight:800;text-align:center;padding:7px 10px;border-bottom:2px solid var(--emerald-b);letter-spacing:.4px;text-transform:uppercase;border-left:2px solid var(--emerald)}
.th-pg{background:#f0f7ff;color:#2563eb;font-size:9.5px;font-weight:700;padding:7px 10px;text-align:left;border-bottom:1px solid var(--blue-b);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-right:1px solid rgba(59,130,246,.1)}
.th-sg{background:#f0fdf8;color:#059669;font-size:9.5px;font-weight:700;padding:7px 10px;text-align:left;border-bottom:1px solid var(--emerald-b);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-right:1px solid rgba(16,185,129,.1)}
.th-divider{border-left:2px solid var(--emerald)!important}

table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--ink2);border-right:1px solid rgba(0,0,0,.025)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf9}
tr.rto td{background:#fffbeb}
tr.rlb td{background:#fff5f5}
.td-div{border-left:2px solid var(--emerald)!important}

.dc{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;font-weight:500}
.hc{font-weight:700;font-size:11.5px;color:var(--ink);white-space:nowrap}
.mat{font-weight:600;font-size:11.5px;color:var(--ink);line-height:1.4;word-break:break-word}
.pgr{font-size:10.5px;color:var(--muted);font-weight:500}

/* ── TAGS ── */
.tg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:9.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.tp{background:var(--blue-s);color:var(--blue-d);border:1px solid var(--blue-b)}
.ts2{background:var(--emerald-s);color:#065f46;border:1px solid var(--emerald-b)}
.tt{background:var(--amber-s);color:#92400e;border:1px solid var(--amber-b)}
.tl{background:var(--rose-s);color:#9f1239;border:1px solid var(--rose-b)}

/* ── PJ CHIP ── */
.pjc{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--violet);background:var(--violet-s);border:1px solid var(--violet-b);padding:2px 8px;border-radius:6px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}

/* ── CHECKBOX ── */
.cb-wrap{display:flex;align-items:center;justify-content:center}
input[type=checkbox].cbx{width:18px;height:18px;cursor:pointer;accent-color:#6366f1;flex-shrink:0;-webkit-tap-highlight-color:transparent;margin:0}
input[type=checkbox].cbx.gn{accent-color:var(--emerald)}

/* ── ZOOM BUTTON ── */
.zbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:9.5px;font-weight:700;background:var(--violet-s);color:var(--violet);border:1px solid var(--violet-b);text-decoration:none;white-space:nowrap;cursor:pointer;transition:all .15s}
.zbtn:hover{background:var(--violet-b)}
.zbtn.empty{opacity:.35;border-style:dashed;cursor:default;pointer-events:none}

/* ── WA LINK ── */
.wl{display:inline-flex;align-items:center;gap:4px;color:#065f46;font-size:10.5px;font-weight:700;text-decoration:none;padding:3px 9px;border-radius:6px;background:var(--emerald-s);border:1px solid var(--emerald-b);transition:all .15s;white-space:nowrap}
.wl:hover{background:var(--emerald-b)}

/* ── EDITABLE WA ── */
.wei{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.wi{border:1.5px solid var(--line2);border-radius:6px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:10.5px;background:white;color:var(--ink);outline:none;transition:border-color .15s;width:128px}
.wi:focus{border-color:var(--blue)}
.wi::placeholder{color:var(--ghost)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--line2);background:white;color:var(--ink);transition:all .15s;white-space:nowrap;text-decoration:none;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--warm);border-color:var(--line2)}
.btn:active{transform:scale(.97)}
.bd2{background:var(--ink);color:white;border-color:var(--ink)}.bd2:hover{background:var(--ink2)}
.bsm{padding:4px 10px;font-size:11px}
.bwa{background:#22c55e;color:white;border-color:#22c55e}.bwa:hover{background:#16a34a}

/* ── PJ BLOCK ── */
.pjb{display:flex;flex-direction:column;gap:3px}
.pjr{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink2);line-height:1.4}
.pjn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--sky-s);color:var(--sky);font-size:8px;font-weight:700;flex-shrink:0;border:1px solid var(--sky-b)}

/* ── KONTAK SECTION DIVIDER ── */
tr.sd td{background:linear-gradient(90deg,var(--violet-s),var(--blue-s))!important;color:var(--violet)!important;font-weight:700;font-size:10px;padding:8px 12px;letter-spacing:.5px;text-transform:uppercase;font-family:'DM Mono',monospace;border-bottom:1px solid var(--violet-b)!important}

/* ── ZOOM SECTION ── */
.zoom-section{background:white;border:1px solid var(--line);border-radius:var(--rl);padding:1.5rem;margin-top:1.75rem;box-shadow:var(--sh)}
.zoom-section-title{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.zoom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.zoom-day-card{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;transition:border-color .2s}
.zoom-day-card:hover{border-color:var(--line2)}
.zoom-day-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;font-family:'DM Mono',monospace}
.zoom-slot{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.zoom-slot:last-child{margin-bottom:0}
.zoom-slot-label{font-size:10.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:5px}
.zoom-inp-wrap{display:flex;gap:5px;align-items:center}
.zoom-inp{flex:1;border:1.5px solid var(--line2);border-radius:6px;padding:5px 9px;font-family:'DM Mono',monospace;font-size:10px;background:white;color:var(--ink);outline:none;transition:border-color .15s}
.zoom-inp:focus{border-color:var(--violet)}
.zoom-inp::placeholder{color:var(--ghost)}
.zoom-preview{margin-top:4px;min-height:22px}

/* ── CONFIG NOTE ── */
.cfg-note{font-size:11.5px;color:var(--ink2);line-height:1.7;background:var(--blue-s);border:1px solid var(--blue-b);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:.9rem}
.cfg-note ol{padding-left:1.2rem;margin-top:.3rem}
.cfg-note li{margin-bottom:.25rem}
.cfg-inp{width:100%;border:1.5px solid var(--line2);border-radius:6px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:11.5px;background:white;color:var(--ink);outline:none;margin:.5rem 0;transition:border-color .15s}
.cfg-inp:focus{border-color:var(--blue)}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(28,25,23,.5);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.mo{align-items:center;padding:1rem}}
.mb{background:white;border-radius:var(--rx) var(--rx) 0 0;padding:1.5rem;width:100%;max-width:580px;box-shadow:var(--shx);position:relative;max-height:92vh;overflow-y:auto}
@media(min-width:640px){.mb{border-radius:var(--rx)}}
.mh{width:40px;height:4px;border-radius:99px;background:var(--line2);margin:0 auto 1rem;display:block}
@media(min-width:640px){.mh{display:none}}
.mt2{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:.75rem;padding-right:2rem;letter-spacing:-.3px}
.mbd{font-size:12px;line-height:1.8;white-space:pre-wrap;background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:1rem;color:var(--ink2);margin-bottom:1rem;max-height:240px;overflow-y:auto;font-family:'DM Mono',monospace}
.mx{position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
.mx:hover{background:var(--warm)}
.ma{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}

/* ── MOBILE CARDS ── */
.cl{display:none}
.cd{background:white;border:1px solid var(--line);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);transition:box-shadow .2s}
.cd:hover{box-shadow:var(--shm)}
.cdh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.cm2{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:3px;line-height:1.4}
.cp{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500}
.cr{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-top:1px solid var(--line)}
.crl{font-size:11px;color:var(--muted);font-weight:600}
.cpj{font-size:11px;color:var(--violet);font-weight:600}

/* ── RESPONSIVE ── */
@media(max-width:767px){
  .ts.jts{display:none}.cl{display:block}
  .hd,.mn,.pb,.sync-bar{padding-left:.875rem;padding-right:.875rem}
  .pt{width:55px}.tb{padding:6px 12px;font-size:12px}.ht{font-size:13.5px}
  .sg{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:768px){.ts.jts{display:block}.cl{display:none}}
@media print{
  .hd,.pb,.sync-bar,.hr,.btn,.mo{display:none!important}
  .pn{display:block!important}
  body{background:white;font-size:10px}
  .ts{box-shadow:none;border:1px solid #ccc}
  .cl{display:none!important}.ts.jts{display:block!important}
}
</style>
</head>
<body>

    <button class="mx" onclick="closeMo()">&#x2715;</button>

</div>
<header class="hd">

<script>
/* ════ CONFIG ════ */
let SCRIPT_URL=localStorage.getItem('gs_url')||'';

/* ════ DATA ════ */
const WD={

/* ════ SYNC STATUS ════ */
function setSyncStatus(s,msg){
  const dot=document.getElementById('sdot'),txt=document.getElementById('sync-txt');
  if(!dot||!txt)return;
  dot.className='sync-dot '+s;txt.textContent=msg;
  if(s==='ok'){const el=document.getElementById('sync-last');if(el)el.textContent='Sync '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
}

/* ════ FETCH STATE ════ */
async function fetchState(){
  if(!SCRIPT_URL){setSyncStatus('err','Belum terhubung \u2014 klik \u2699\uFE0F Konfigurasi');return false;}
  setSyncStatus('loading','Sinkronisasi...');
  try{
    const res=await fetch(SCRIPT_URL+'?action=read&t='+Date.now(),{redirect:'follow'});
    const txt=await res.text();
    if(txt.trim().startsWith('<'))throw new Error('Apps Script belum di-deploy. Pastikan access: Anyone.');
    const j=JSON.parse(txt);
    if(!j.ok)throw new Error(j.error||'Error GAS');
    const sc=j.data.checkboxes||{};
    const now=Date.now();
    Object.keys(sc).forEach(k=>{
      // Skip if user changed this within DIRTY_TTL ms
      const lastChange=DIRTY_TIME[k]||0;
      if(!DIRTY.has(k)&&(now-lastChange)>DIRTY_TTL){
        STATE.checkboxes[k]=sc[k];
      }
    });
    if(j.data.zoom)Object.keys(j.data.zoom).forEach(k=>{STATE.zoom[k]={url:j.data.zoom[k],label:''};});
    if(j.data.wa)Object.assign(STATE.wa,j.data.wa);
    try{Object.keys(STATE.checkboxes).forEach(k=>localStorage.setItem('ft5_cb_'+k,STATE.checkboxes[k]));}catch(e){}
    setSyncStatus('ok','Tersinkron \u2714\uFE0F');
    renderCbs();renderZoomBtns();upPr();return true;
  }catch(e){setSyncStatus('err','Error: '+e.message);return false;}
}

async function postState(type,payload){
  if(!SCRIPT_URL)return;
  try{
    const params=new URLSearchParams({action:'write',type,...payload});
    const res=await fetch(SCRIPT_URL+'?'+params+'&t='+Date.now(),{redirect:'follow'});
    const txt=await res.text();
    if(type==='cb'&&payload.key){
      try{
        if(JSON.parse(txt).ok){
          // Only clear from DIRTY after TTL has passed (server confirmed)
          setTimeout(()=>DIRTY.delete(payload.key), DIRTY_TTL);
        }
      }catch{setTimeout(()=>DIRTY.delete(payload.key), DIRTY_TTL);}
    }
  }catch(e){if(type==='cb'&&payload.key)setTimeout(()=>DIRTY.delete(payload.key),DIRTY_TTL);}
}
setInterval(fetchState,30000);

/* ════ CHECKBOX ════ */
function getCb(k){
  if(STATE.checkboxes[k]!==undefined)return STATE.checkboxes[k]==='1';
  try{return localStorage.getItem('ft5_cb_'+k)==='1';}catch{return false;}
}
function onCbChange(key,el){
  const val=el.checked;
  STATE.checkboxes[key]=val?'1':'0';
  DIRTY.add(key);
  DIRTY_TIME[key]=Date.now(); // record exact time of user interaction
  document.querySelectorAll('[data-cbkey="'+key+'"]').forEach(o=>{if(o!==el&&o.checked!==val)o.checked=val;});
  try{localStorage.setItem('ft5_cb_'+key,val?'1':'0');}catch{}
  postState('cb',{key,value:val?'1':'0'});
  upPr();
}
function renderCbs(){
  document.querySelectorAll('[data-cbkey]').forEach(el=>{
    const k=el.dataset.cbkey,s=STATE.checkboxes[k]==='1';

}

      cds+='<div class="ws"><div class="wh"><span class="wh-badge">'+ML[cm]+'</span><span class="wh-label">'+['20\u201324 April 2026','27 April \u2013 1 Mei 2026','4\u20138 Mei 2026','11\u201313 Mei 2026'][cm-1]+'</span></div><div class="cl">';
    }
    const isTO=r.tp==='to',isLB=r.tp==='lb',isSLB=r.ts==='lb'||r.siang==='\u2014';
    const rc=isLB?'rlb':isTO?'rto':'';
    const tgP=isTO?'<span class="tg tt">TRY OUT</span>':isLB?'<span class="tg tl">LIBUR</span>':'<span class="tg tp">PAGI</span>';
    const tgS=isSLB?'<span style="color:var(--ghost);">\u2014</span>':'<span class="tg ts2">SIANG</span>';
    const kP=r.tgl+'_PAGI',kS=r.tgl+'_SIANG';
    const pjP=PJ_PAGI[r.tgl]||'',pjS=PJ_SIANG[r.tgl]||'';
    const cbP=(!isTO&&!isLB&&r.pp!=='\u2014'&&pjP)?'<div class="cb-wrap"><input type="checkbox" class="cbx" data-cbkey="soal_'+kP+'" '+(getCb('soal_'+kP)?'checked':'')+' onchange="onCbChange(\'soal_'+kP+'\',this)"></div>':'<div style="text-align:center;color:var(--ghost)">\u2014</div>';
    const cbS=(!isSLB&&r.sp!=='\u2014'&&pjS)?'<div class="cb-wrap"><input type="checkbox" class="cbx gn" data-cbkey="soal_'+kS+'" '+(getCb('soal_'+kS)?'checked':'')+' onchange="onCbChange(\'soal_'+kS+'\',this)"></div>':'<div style="text-align:center;color:var(--ghost)">\u2014</div>';
    const pjPh=pjP?'<span class="pjc">&#x1F464; '+pjP+'</span>':'<span style="color:var(--ghost);font-size:10px">\u2014</span>';
    const pjSh=pjS?'<span class="pjc">&#x1F464; '+pjS+'</span>':'<span style="color:var(--ghost);font-size:10px">\u2014</span>';

    tbl+='<tr class="'+rc+'">'+
      '<td class="dc">'+r.tgl+'</td>'+
      '<td class="hc">'+r.hari+'</td>'+
      '<td style="text-align:center">'+tgP+'</td>'+
      '<td><span class="mat">'+r.pagi+'</span></td>'+
      '<td class="pgr">'+r.pp+'</td>'+
      '<td>'+cbP+'</td>'+
      '<td>'+pjPh+'</td>'+
      '<td style="text-align:center">'+(!isLB&&!isTO?zBtn(kP):'')+'</td>'+
      '<td class="td-div" style="text-align:center">'+tgS+'</td>'+
      '<td><span class="mat">'+(r.siang||'\u2014')+'</span></td>'+
      '<td class="pgr">'+r.sp+'</td>'+
      '<td>'+cbS+'</td>'+
      '<td>'+pjSh+'</td>'+
      '<td style="text-align:center">'+(!isSLB?zBtn(kS):'')+'</td>'+
      '</tr>';

    if(!isLB){
      const cbPm=(!isTO&&r.pp!=='\u2014'&&pjP)?'<input type="checkbox" class="cbx" data-cbkey="soal_'+kP+'" '+(getCb('soal_'+kP)?'checked':'')+' onchange="onCbChange(\'soal_'+kP+'\',this)">':'<span style="color:var(--ghost)">N/A</span>';
      cds+='<div class="cd"><div class="cdh"><div><span class="dc">'+r.tgl+'</span> &nbsp;<strong class="hc">'+r.hari+'</strong></div><span class="tg '+(isTO?'tt':'tp')+'">'+(isTO?'TRY OUT':'PAGI')+'</span></div><div class="cm2">'+r.pagi+'</div><div class="cp">'+r.pp+'</div><div class="cr"><span class="crl">&#x270F;&#xFE0F; Soal</span>'+cbPm+'</div>'+(pjP?'<div class="cr"><span class="crl">&#x1F464; PJ</span><span class="cpj">'+pjP+'</span></div>':'')+'<div class="cr"><span class="crl">&#x1F4F9; Zoom</span>'+(!isTO?zBtn(kP):'<span style="color:var(--ghost)">N/A</span>')+'</div></div>';
    }
    if(!isSLB){
      const cbSm=(r.sp!=='\u2014'&&pjS)?'<input type="checkbox" class="cbx gn" data-cbkey="soal_'+kS+'" '+(getCb('soal_'+kS)?'checked':'')+' onchange="onCbChange(\'soal_'+kS+'\',this)">':'<span style="color:var(--ghost)">N/A</span>';
      cds+='<div class="cd"><div class="cdh"><div><span class="dc">'+r.tgl+'</span> &nbsp;<strong class="hc">'+r.hari+'</strong></div><span class="tg ts2">SIANG</span></div><div class="cm2">'+r.siang+'</div><div class="cp">'+r.sp+'</div><div class="cr"><span class="crl">&#x270F;&#xFE0F; Soal</span>'+cbSm+'</div>'+(pjS?'<div class="cr"><span class="crl">&#x1F464; PJ</span><span class="cpj">'+pjS+'</span></div>':'')+'<div class="cr"><span class="crl">&#x1F4F9; Zoom</span>'+zBtn(kS)+'</div></div>';
    }
  });
  tbl+='</tbody></table></div></div>';cds+='</div></div>';
  document.getElementById('jc').innerHTML=tbl+cds;
}

/* ════ BUILD KONTAK ════ */
function bKontak(){
  const rows=[];
  DATA.forEach((r,i)=>{
    if(r.pp!=='\u2014')rows.push({...r,i,ses:'PAGI',pgr:r.pp,mat:r.pagi});
    if(r.sp!=='\u2014'&&r.siang!=='\u2014')rows.push({...r,i,ses:'SIANG',pgr:r.sp,mat:r.siang});
  });
  let h='<div class="ts"><table><thead><tr>'+
    '<th class="th-span" style="width:88px">Tanggal</th>'+
    '<th class="th-span" style="width:52px">Hari</th>'+
    '<th class="th-span" style="width:58px">Sesi</th>'+
    '<th class="th-span">Pengajar</th>'+
    '<th class="th-span" style="width:152px">WhatsApp</th>'+
    '<th class="th-span" style="width:74px;text-align:center">&#x2705; Dihubungi</th>'+
    '<th class="th-span" style="width:74px;text-align:center">&#x1F4AC; Template</th>'+
    '<th class="th-span" style="width:152px">PJ Soal &amp; Penghubung</th>'+
    '</tr></thead><tbody>';
  let cm=0;
  rows.forEach(r=>{
    if(r.m!==cm){cm=r.m;h+='<tr class="sd"><td colspan="8">&#x25B6; '+['Minggu 1 \u2014 20\u201324 April 2026','Minggu 2 \u2014 27 Apr \u2013 1 Mei 2026','Minggu 3 \u2014 4\u20138 Mei 2026','Minggu 4 \u2014 11\u201313 Mei 2026'][cm-1]+'</td></tr>';}
    const isp=r.ses==='PAGI';
    const tg=isp?'<span class="tg tp">PAGI</span>':'<span class="tg ts2">SIANG</span>';
    const pk=r.tgl+'_'+r.ses;const pjNm=PJ_ALL[pk]||'\u2014';const hk='hub_'+pk;
    const cb='<div class="cb-wrap"><input type="checkbox" class="cbx '+(isp?'':'gn')+'" data-cbkey="'+hk+'" '+(getCb(hk)?'checked':'')+' onchange="onCbChange(\''+hk+'\',this)"></div>';
    const uid=(r.tgl+'_'+r.ses).replace(/-/g,'');
    const pE=r.pgr.replace(/\\/g,'\\\\').replace(/'/g,"\\'");const mE=r.mat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const tBtn='<div class="cb-wrap"><button class="btn bsm" onclick="opMo(\''+pE+'\',\''+mE+'\',\''+r.tgl+'\',\''+r.hari+'\')">&#x1F4DD; Lihat</button></div>';
    const pjH=pjNm!=='\u2014'?'<span class="pjc">&#x1F464; '+pjNm+'</span>':'<span style="color:var(--ghost);font-size:10px">\u2014</span>';
    h+='<tr><td class="dc">'+r.tgl+'</td><td class="hc">'+r.hari+'</td><td>'+tg+'</td><td class="pgr" style="font-size:11px;font-weight:600;color:var(--ink2)">'+r.pgr+'</td><td>'+waCell(r.pgr,r.mat,r.tgl,r.hari,uid)+'</td><td>'+cb+'</td><td>'+tBtn+'</td><td>'+pjH+'</td></tr>';
  });
  h+='</tbody></table></div>';

  // Zoom section
  const zslots=DATA.filter(r=>!r.tp&&!r.ts&&r.pp!=='\u2014');
  h+='<div class="zoom-section"><div class="zoom-section-title">&#x1F4F9; Link Zoom per Sesi <span style="font-size:11px;font-weight:500;color:var(--muted)">— tersinkron ke tombol Zoom di tab Jadwal</span></div><div class="zoom-grid">';
  zslots.forEach(r=>{
    const kP=r.tgl+'_PAGI',kS=r.tgl+'_SIANG',hasSiang=r.sp!=='\u2014'&&r.siang!=='\u2014';
    h+='<div class="zoom-day-card"><div class="zoom-day-label">'+r.hari+', '+r.tgl+'</div>';
    h+='<div class="zoom-slot"><div class="zoom-slot-label"><span class="tg tp" style="margin-right:4px">PAGI</span>'+r.pagi.slice(0,32)+(r.pagi.length>32?'...':'')+'</div><div class="zoom-inp-wrap"><input class="zoom-inp" data-zoom-inp="'+kP+'" placeholder="https://zoom.us/j/..." value="'+(getZoom(kP).url||'')+'" oninput="saveZoom(\''+kP+'\',this.value)"></div><div class="zoom-preview">'+zBtn(kP)+'</div></div>';
    if(hasSiang)h+='<div class="zoom-slot"><div class="zoom-slot-label"><span class="tg ts2" style="margin-right:4px">SIANG</span>'+r.siang.slice(0,32)+(r.siang.length>32?'...':'')+'</div><div class="zoom-inp-wrap"><input class="zoom-inp" data-zoom-inp="'+kS+'" placeholder="https://zoom.us/j/..." value="'+(getZoom(kS).url||'')+'" oninput="saveZoom(\''+kS+'\',this.value)"></div><div class="zoom-preview">'+zBtn(kS)+'</div></div>';
    h+='</div>';
  });
  h+='</div></div>';
  document.getElementById('kc').innerHTML=h;
}

/* ════ TAB ════ */
function swTab(tab,btn){
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pn-'+tab).classList.add('on');btn.classList.add('on');
  const bc=document.getElementById('btn-ct');if(bc)bc.style.display=(tab==='jadwal'&&window.innerWidth>=768)?'inline-flex':'none';
}

/* ════ INIT ════ */
try{
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('ft5_cb_'))STATE.checkboxes[k.slice(7)]=localStorage.getItem(k);
  }
}catch(e){}
bStats();bJadwal();bKontak();upPr();
if(window.innerWidth>=768)document.getElementById('btn-ct').style.display='inline-flex';
fetchState().then(ok=>{if(!ok&&!SCRIPT_URL)setTimeout(openCfg,1200);});
</script>
