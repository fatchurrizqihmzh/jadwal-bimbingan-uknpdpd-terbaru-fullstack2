.ht{font-size:14px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
.hs{font-size:10.5px;color:var(--mu)}
.hr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--r);padding:3px;border:1px solid var(--bd)}
.tb{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}

/* SYNC STATUS */
.sync-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:6px 1rem;font-size:10.5px;color:var(--mu);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-inner{max-width:1700px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--fa);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#22c55e}.sync-dot.err{background:#ef4444}.sync-dot.loading{background:var(--am);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-cfg-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);font-family:inherit;font-size:10.5px;cursor:pointer;color:var(--bl);font-weight:500}

/* PROGRESS */
.pb{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 1rem}
.pbi{max-width:1700px;margin:0 auto;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.pi{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--mu);white-space:nowrap}
.pt{width:80px;height:5px;background:var(--bd);border-radius:99px;overflow:hidden;flex-shrink:0}
.pf{height:100%;border-radius:99px;transition:width .4s}
.fb{background:var(--bl)}.fa2{background:var(--am)}
.pp{font-weight:700;color:var(--tx);font-size:11px;min-width:32px}

/* MAIN */
.mn{max-width:1700px;margin:0 auto;padding:1rem 1rem 4rem}
.pn{display:none}.pn.on{display:block}

/* WEEK */
.ws{margin-bottom:1.5rem}
.wh{display:flex;align-items:center;gap:8px;margin-bottom:.6rem;padding:8px 12px;background:var(--tx);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600;letter-spacing:.4px}
.wd{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.5;flex-shrink:0}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;box-shadow:var(--sh)}
.sl{font-size:9.5px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sv{font-size:20px;font-weight:700;line-height:1}
.ss{font-size:9.5px;color:var(--fa);margin-top:2px}

/* TABLE */
.ts{overflow-x:auto;border-radius:var(--rl);box-shadow:var(--shm);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:var(--sf);font-size:12px}
table th{background:var(--s2);font-weight:600;font-size:10px;color:var(--mu);padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--bd);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-right:1px solid var(--bd)}
table td{padding:7px 9px;border-bottom:1px solid var(--bd);border-right:1px solid #f0ede6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.dc{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--mu);white-space:nowrap}
.hc{font-weight:600;font-size:11.5px;white-space:nowrap}
.mt{font-weight:500;font-size:11px;line-height:1.4;word-break:break-word}

/* TAGS */
.tg{display:inline-block;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.3px;margin-right:3px;white-space:nowrap}
.tp{background:var(--bll);color:var(--bl)}.ts2{background:var(--grl);color:var(--gr)}.tt{background:var(--aml);color:var(--am)}.tl{background:var(--rdl);color:var(--rd)}

input[type=checkbox].cbx.gn{accent-color:var(--gr)}

/* PJ SOAL */
.pjs{font-size:10.5px;color:var(--tl);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}

/* ZOOM BUTTON */

.zbtn.empty{opacity:.45;border-style:dashed;cursor:default;pointer-events:none}

/* SPECIAL ROWS */

tr.rlb td{background:#fff5f5}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--bds);background:var(--sf);color:var(--tx);transition:all .15s;white-space:nowrap;text-decoration:none;-webkit-tap-highlight-color:transparent}

.bd2{background:var(--tx);color:#fff;border-color:var(--tx)}.bd2:hover{background:#333}
.bsm{padding:4px 9px;font-size:10.5px}
.bwa{background:#25d366;color:#fff;border-color:#25d366}.bwa:hover{background:#1ebe5d}
.bzm{background:var(--zm);color:#fff;border-color:var(--zm)}.bzm:hover{background:#5b21b6}

.wl{display:inline-flex;align-items:center;gap:4px;color:var(--gr);font-size:10.5px;font-weight:600;text-decoration:none;padding:3px 9px;border-radius:99px;background:var(--grl);border:1px solid var(--grm);transition:all .15s;white-space:nowrap}
.wl:hover{background:var(--grm)}

.wi{border:1.5px solid var(--bd);border-radius:6px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:10.5px;background:var(--sf);color:var(--tx);outline:none;transition:border-color .15s;width:130px}

.wi::placeholder{color:var(--fa);font-family:inherit}

/* PJ BLOCK */

.pjr{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--tx);line-height:1.4}

tr.sd td{background:var(--tx)!important;color:#fff!important;font-weight:600;font-size:11px;padding:7px 10px;letter-spacing:.3px}

.zoom-section-title{font-size:13px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px}

.zoom-day-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.zoom-day-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);margin-bottom:8px}

.zoom-slot-label{font-size:10px;font-weight:600;color:var(--tx)}
.zoom-inp-wrap{display:flex;gap:5px;align-items:center}
.zoom-inp{flex:1;border:1.5px solid var(--bd);border-radius:6px;padding:5px 9px;font-family:inherit;font-size:10.5px;background:var(--sf);color:var(--tx);outline:none;transition:border-color .15s}

.zoom-save:hover{background:var(--zmm)}
.zoom-preview{display:flex;align-items:center;gap:5px;margin-top:3px;min-height:20px}

.cfg-inp:focus{border-color:var(--bl)}
.cfg-note{font-size:11px;color:var(--mu);line-height:1.6;background:var(--bll);border:1px solid var(--blm);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.75rem}

/* ════════════════════════════════════════════════
   STATE (in-memory, synced from/to GSheets)
════════════════════════════════════════════════ */
let STATE = { checkboxes:{}, zoom:{}, wa:{} };

/* ════════════════════════════════════════════════
   GOOGLE SHEETS SYNC
   Fix: dirty-key tracking agar server tidak overwrite
   centang yang baru saja dibuat user (race condition fix)
════════════════════════════════════════════════ */
const DIRTY = new Set(); // keys yang belum dikonfirmasi server
function setSyncStatus(status, msg) {
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('sync-txt');
  if (!dot||!txt) return;
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
  if (status === 'ok') {
    const now = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('sync-last');
    if (el) el.textContent = 'Terakhir sync: ' + now;
  }
}

async function fetchState() {
  if (!SCRIPT_URL) {
    setSyncStatus('err', 'Belum terhubung — klik ⚙️ Konfigurasi');
    return false;
  }
  setSyncStatus('loading', 'Mengambil data dari Google Sheets...');
  try {
    // Tambah timestamp agar tidak kena cache browser
    const url = SCRIPT_URL + '?action=read&t=' + Date.now();
    const res = await fetch(url, {redirect:'follow'});
    const text = await res.text();
    // GAS kadang return HTML error page jika belum di-deploy benar
    if (text.trim().startsWith('<')) {
      throw new Error('Apps Script belum di-deploy dengan benar. Pastikan sudah Deploy sebagai Web App dengan akses "Anyone".');
    }
    const json = JSON.parse(text);
    if (!json.ok) throw new Error(json.error || 'Unknown error dari Apps Script');
    // Merge checkboxes — SKIP dirty keys (user baru centang, belum dikonfirmasi)
    const serverCb = json.data.checkboxes || {};
    Object.keys(serverCb).forEach(k => {
      if (!DIRTY.has(k)) {
        STATE.checkboxes[k] = serverCb[k];
      }
    });
    // Zoom links
    if (json.data.zoom) {
      Object.keys(json.data.zoom).forEach(k => {
        STATE.zoom[k] = {url: json.data.zoom[k], label:''};
      });
    }
    if (json.data.wa) Object.assign(STATE.wa, json.data.wa);
    // Persist semua ke localStorage (termasuk dirty — STATE sudah benar)
    try {
      Object.keys(STATE.checkboxes).forEach(k => localStorage.setItem('cb_'+k, STATE.checkboxes[k]));
    } catch(e){}
    setSyncStatus('ok', 'Tersinkron ✔️');
    renderCheckboxes();
    renderZoomButtons();
    upPr();
    return true;
  } catch(e) {
    setSyncStatus('err', 'Error: ' + e.message);
    console.error('fetchState error:', e);
    return false;
  }
}

// POST menggunakan GET parameter trick (workaround CORS GAS)
// Data dikirim sebagai query string, GAS baca dari e.parameter
async function postState(type, payload) {
  if (!SCRIPT_URL) return;
  try {
    const params = new URLSearchParams({action:'write', type, ...payload});
    const url = SCRIPT_URL + '?' + params.toString() + '&t=' + Date.now();
    // Tunggu konfirmasi server sebelum hapus dari dirty set
    const res = await fetch(url, {redirect:'follow'});
    const txt = await res.text();
    // Jika server konfirmasi OK, hapus dari dirty
    if (type === 'cb' && payload.key) {
      try {
        const j = JSON.parse(txt);
        if (j.ok) DIRTY.delete(payload.key);
      } catch(e) { DIRTY.delete(payload.key); } // hapus juga jika parse gagal
    }
  } catch(e) {
    console.warn('postState error:', e);
    // Pada error network, hapus dari dirty agar tidak block selamanya
    if (type === 'cb' && payload.key) DIRTY.delete(payload.key);
  }
}

// Auto-refresh setiap 30 detik
setInterval(fetchState, 30000);

/* ════════════════════════════════════════════════
   CHECKBOX LOGIC
════════════════════════════════════════════════ */
function getCb(key) {
  // STATE (dari GSheets) prioritas utama
  if (STATE.checkboxes[key] !== undefined) return STATE.checkboxes[key] === '1';
  // Fallback ke localStorage saat GSheets belum selesai load
  try { return localStorage.getItem('cb_'+key) === '1'; } catch(e){ return false; }
}

function setCb(key, val) {
  STATE.checkboxes[key] = val ? '1' : '0';
  // also fallback localStorage
  try { localStorage.setItem('cb_'+key, val?'1':'0'); } catch(e){}
  postState('cb', {key, value: val?'1':'0'});
  upPr();
}

function onCbChange(key, el) {
  const val = el.checked;
  STATE.checkboxes[key] = val ? '1' : '0';
  // Mark dirty DULU agar fetchState tidak overwrite
  DIRTY.add(key);
  // Sync semua elemen lain (desktop & mobile) sekaligus
  document.querySelectorAll('[data-cbkey="'+key+'"]').forEach(other => {
    if (other !== el && other.checked !== val) other.checked = val;
  });
  // Simpan ke localStorage langsung
  try { localStorage.setItem('cb_'+key, val?'1':'0'); } catch(e){}
  // Kirim ke GSheets (await di background, konfirmasi hapus dirty)
  postState('cb', {key, value: val?'1':'0'});
  upPr();
}

function renderCheckboxes() {
  // data-cbkey selector catches BOTH desktop and mobile checkboxes
  document.querySelectorAll('[data-cbkey]').forEach(el => {
    const key = el.dataset.cbkey;
    const should = STATE.checkboxes[key] === '1';
    if (el.checked !== should) el.checked = should;
  });
}

/* ════════════════════════════════════════════════
   ZOOM LINKS
════════════════════════════════════════════════ */
function getZoom(key) { return STATE.zoom[key]||{url:'',label:''}; }

function setZoom(key, url) {
  STATE.zoom[key] = {url, label:''};
  try { localStorage.setItem('zoom_'+key, url); } catch(e){}
  postState('zoom', {key, url, label:''});
  renderZoomButtons();
}

function renderZoomButtons() {
  // Update all zoom buttons
  document.querySelectorAll('[data-zoom-key]').forEach(el => {
    const key = el.dataset.zoomKey;
    const z = getZoom(key);
    if (z.url) {
      el.href = z.url;
      el.classList.remove('empty');
      el.innerHTML = '&#x1F4F9; Zoom';
    } else {
      el.href = '#';
      el.classList.add('empty');
      el.innerHTML = '&#x1F4F9; Zoom';
    }
  });
  // Update inputs in zoom section
  document.querySelectorAll('[data-zoom-inp]').forEach(inp => {
    const key = inp.dataset.zoomInp;
    const z = getZoom(key);
    if (z.url && !inp.value) inp.value = z.url;
  });
}

  const h = new Date().toLocaleString('en-US',{timeZone:'Asia/Jakarta',hour:'numeric',hour12:false});
  const hr = parseInt(h);
  if (hr >= 5 && hr < 11) return 'pagi';
  if (hr >= 11 && hr < 15) return 'siang';
  if (hr >= 15 && hr < 18) return 'sore';
  return 'malam';
}

    const pjSh = pjS ? '<div class="pjs" title="'+pjS+'">&#x1F464; '+pjS+'</div>' : '<span style="color:var(--fa);font-size:10px">\u2014</span>';

    // Styling sisi batas kanan Zoom pagi
    const bdR = 'border-right:3px solid #bfdbfe';
    tbl += '<tr class="'+rc+'">' +
      '<td class="dc" style="vertical-align:middle">'+r.tgl+'</td>' +
      '<td class="hc" style="vertical-align:middle">'+r.hari+'</td>' +
      '<td style="vertical-align:middle;border-right:2px solid var(--bds)">'+tgP+'</td>' +
      '<td><span class="mt">'+r.pagi+'</span></td>' +
      '<td style="font-size:10.5px;font-weight:500;vertical-align:middle">'+r.pp+'</td>' +
      '<td>'+cbP+'</td><td>'+pjPh+'</td>' +
      '<td style="text-align:center;'+bdR+'">'+(!isLB&&!isTO?zoomBtn(kP):'')+'</td>' +
      '<td style="vertical-align:middle;border-right:2px solid var(--bds)">'+tgS+'</td>' +
      '<td><span class="mt">'+(r.siang||'\u2014')+'</span></td>' +
      '<td style="font-size:10.5px;font-weight:500;vertical-align:middle">'+r.sp+'</td>' +
      '<td>'+cbS+'</td><td>'+pjSh+'</td>' +
      '<td style="text-align:center">'+(!isSLB?zoomBtn(kS):'')+'</td>' +
      '</tr>';

    // MOBILE CARDS
    if (!isLB) {
      cds += '<div class="cd">' +
        '<div class="cdh"><div><span class="dc">'+r.tgl+'</span> <strong style="font-size:11.5px">'+r.hari+'</strong></div>' +
        '<span class="tg '+(isTO?'tt':'tp')+'">'+(isTO?'TRY OUT':'PAGI')+'</span></div>' +
        '<div class="cm2">'+r.pagi+'</div><div class="cp">'+r.pp+'</div>' +
        (!isTO&&r.pp!=='\u2014'&&pjP?
          '<div class="cr"><span class="crl">&#x270F;&#xFE0F; Soal</span>' +
          '<input type="checkbox" class="cbx" id="cbx_soal_'+kP+'_m" data-cbkey="soal_'+kP+'" '+(getCb('soal_'+kP)?'checked':'')+' onchange="onCbChange(\'soal_'+kP+'\',this)"></div>':'')+
        (pjP?'<div class="cr"><span class="crl">&#x1F464; PJ</span><span class="cpj">'+pjP+'</span></div>':'')+
        (!isTO?'<div class="cr"><span class="crl">&#x1F4F9; Zoom</span>'+zoomBtn(kP)+'</div>':'')+
        '</div>';
    }
    if (!isSLB) {
      cds += '<div class="cd">' +
        '<div class="cdh"><div><span class="dc">'+r.tgl+'</span> <strong style="font-size:11.5px">'+r.hari+'</strong></div>' +
        '<span class="tg ts2">SIANG</span></div>' +
        '<div class="cm2">'+r.siang+'</div><div class="cp">'+r.sp+'</div>' +
        (r.sp!=='\u2014'&&pjS?
          '<div class="cr"><span class="crl">&#x270F;&#xFE0F; Soal</span>' +
          '<input type="checkbox" class="cbx gn" id="cbx_soal_'+kS+'_m" data-cbkey="soal_'+kS+'" '+(getCb('soal_'+kS)?'checked':'')+' onchange="onCbChange(\'soal_'+kS+'\',this)"></div>':'')+
        (pjS?'<div class="cr"><span class="crl">&#x1F464; PJ</span><span class="cpj">'+pjS+'</span></div>':'')+
        '<div class="cr"><span class="crl">&#x1F4F9; Zoom</span>'+zoomBtn(kS)+'</div>'+
        '</div>';
    }
  });
  tbl += '</tbody></table></div></div>';
  cds += '</div></div>';
  document.getElementById('jc').innerHTML = tbl + cds;
}

/* ════════════════════════════════════════════════
   BUILD KONTAK
════════════════════════════════════════════════ */
function bKontak() {
  const rows = [];
  DATA.forEach((r,i)=>{
    if (r.pp!=='\u2014') rows.push({...r,i,ses:'PAGI',pgr:r.pp,mat:r.pagi});
    if (r.sp!=='\u2014'&&r.siang!=='\u2014') rows.push({...r,i,ses:'SIANG',pgr:r.sp,mat:r.siang});
  });

  let h = '<div class="ts"><table><thead><tr>' +
    '<th style="width:86px">Tanggal</th><th style="width:50px">Hari</th><th style="width:55px">Sesi</th>' +
    '<th>Pengajar</th><th style="width:150px">WhatsApp</th>' +
    '<th style="width:72px;text-align:center">&#x2705; Dihubungi</th>' +
    '<th style="width:72px;text-align:center">&#x1F4AC; Template</th>' +
    '<th style="width:155px">PJ Soal &amp; Penghubung</th>' +
    '</tr></thead><tbody>';

  let cm=0;
  rows.forEach(r=>{
    if (r.m!==cm) {
      cm=r.m;
      h += '<tr class="sd"><td colspan="8">'+ML[cm].replace(/&nbsp;/g,' ').replace(/&middot;/g,'·').replace(/&ndash;/g,'–')+'</td></tr>';
    }
    const isp=r.ses==='PAGI';
    const tg=isp?'<span class="tg tp">PAGI</span>':'<span class="tg ts2">SIANG</span>';
    const pk=r.tgl+'_'+r.ses; const pjNm=PJ[pk]||'\u2014'; const hk='hub_'+pk;
    const cbH='<div class="cb-wrap"><input type="checkbox" class="cbx '+(isp?'':'gn')+'" id="cbx_'+hk+'" data-cbkey="'+hk+'" '+(getCb(hk)?'checked':'')+' onchange="onCbChange(\''+hk+'\',this)"></div>';
    const uid=(r.tgl+'_'+r.ses).replace(/-/g,'');
    const pE=r.pgr.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const mE=r.mat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const tBtn='<div class="cb-wrap"><button class="btn bsm" onclick="opMo(\''+pE+'\',\''+mE+'\',\''+r.tgl+'\',\''+r.hari+'\')">&#x1F4DD; Lihat</button></div>';
    const pjH=pjNm!=='\u2014'?'<div class="pjb"><div class="pjr"><span class="pjn">&#x1F464;</span>'+pjNm+'</div></div>':'<span style="color:var(--fa);font-size:10px">\u2014</span>';
    h += '<tr><td class="dc">'+r.tgl+'</td><td class="hc">'+r.hari+'</td><td>'+tg+'</td>' +
      '<td style="font-size:11px;font-weight:500">'+r.pgr+'</td>' +
      '<td>'+waCell(r.pgr,r.mat,r.tgl,r.hari,uid)+'</td>' +
      '<td>'+cbH+'</td><td>'+tBtn+'</td><td>'+pjH+'</td></tr>';
  });
  h += '</tbody></table></div>';

  // ZOOM SECTION
  h += '<div class="zoom-section"><div class="zoom-section-title">&#x1F4F9; Link Zoom per Sesi<span style="font-size:10.5px;font-weight:400;color:var(--mu);margin-left:8px">Isi link, otomatis tersinkron ke tombol Zoom di tab Jadwal</span></div><div class="zoom-grid" id="zoom-grid">';

  const zoomSlots = DATA.filter(r=>!r.tp&&!r.ts&&r.pp!=='\u2014');
  zoomSlots.forEach(r=>{
    const kP=r.tgl+'_PAGI', kS=r.tgl+'_SIANG';
    const hasSiang = r.sp!=='\u2014'&&r.siang!=='\u2014';
    h += '<div class="zoom-day-card"><div class="zoom-day-label">'+r.hari+', '+r.tgl+'</div>';
    // Pagi slot
    h += '<div class="zoom-slot"><div class="zoom-slot-label"><span class="tg tp" style="margin-right:4px">PAGI</span>'+r.pagi.substring(0,35)+(r.pagi.length>35?'...':'')+'</div>' +
      '<div class="zoom-inp-wrap">' +
      '<input class="zoom-inp" data-zoom-inp="'+kP+'" placeholder="https://zoom.us/j/..." value="'+(getZoom(kP).url||'')+'" oninput="saveZoom(\''+kP+'\',this.value)">' +
      '</div>' +
      '<div class="zoom-preview">'+zoomBtn(kP)+'</div></div>';
    // Siang slot
    if (hasSiang) {
      h += '<div class="zoom-slot"><div class="zoom-slot-label"><span class="tg ts2" style="margin-right:4px">SIANG</span>'+r.siang.substring(0,35)+(r.siang.length>35?'...':'')+'</div>' +
        '<div class="zoom-inp-wrap">' +
        '<input class="zoom-inp" data-zoom-inp="'+kS+'" placeholder="https://zoom.us/j/..." value="'+(getZoom(kS).url||'')+'" oninput="saveZoom(\''+kS+'\',this.value)">' +
        '</div>' +
        '<div class="zoom-preview">'+zoomBtn(kS)+'</div></div>';
    }
    h += '</div>';
  });
  h += '</div></div>';
  document.getElementById('kc').innerHTML = h;
}

function saveZoom(key, url) {
  clearTimeout(window._zoomTimer);
  window._zoomTimer = setTimeout(() => { setZoom(key, url.trim()); }, 600);
}

/* ════════════════════════════════════════════════
   TAB
════════════════════════════════════════════════ */
function swTab(tab, btn) {
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pn-'+tab).classList.add('on');
  btn.classList.add('on');
  const bc=document.getElementById('btn-ct');
  if(bc) bc.style.display=(tab==='jadwal'&&window.innerWidth>=768)?'inline-flex':'none';
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
// ── INIT: muat localStorage dulu agar render pertama sudah benar ──
try {
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('cb_')) {
      STATE.checkboxes[k.slice(3)] = localStorage.getItem(k);
    }
  }
} catch(e) {}

bStats();
bJadwal();
bKontak();
upPr();
if (window.innerWidth >= 768) document.getElementById('btn-ct').style.display='inline-flex';

// Load dari GSheets — update STATE & re-render checkbox
fetchState().then(ok=>{
  if (!ok && !SCRIPT_URL) {
    setTimeout(openCfg, 1200);
  }
});
</script>
